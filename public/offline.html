<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1e40af" />
  <title>Offline — LettingsPro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #eff6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .icon-wrapper svg {
      width: 36px;
      height: 36px;
      color: #3b82f6;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1e293b;
    }
    p {
      font-size: 15px;
      color: #64748b;
      line-height: 1.5;
      max-width: 360px;
      margin-bottom: 24px;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms;
    }
    .retry-btn:hover { background: #1d4ed8; }
    .retry-btn:active { background: #1e40af; }
    .retry-btn svg {
      width: 16px;
      height: 16px;
    }
    .status {
      margin-top: 16px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="icon-wrapper">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"></line>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
      <line x1="12" y1="20" x2="12.01" y2="20"></line>
    </svg>
  </div>

  <h1>You're offline</h1>
  <p>It looks like you've lost your internet connection. Some features may be unavailable, but previously loaded data may still be accessible.</p>

  <button class="retry-btn" onclick="window.location.reload()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
    Try again
  </button>

  <p class="status" id="status">Checking connection...</p>

  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = 'Connection restored! Reloading...';
      setTimeout(() => window.location.reload(), 1000);
    });

    window.addEventListener('offline', () => {
      document.getElementById('status').textContent = 'Still offline. Waiting for connection...';
    });

    // Check current status
    if (navigator.onLine) {
      document.getElementById('status').textContent = 'Connection detected. Reloading...';
      setTimeout(() => window.location.reload(), 500);
    } else {
      document.getElementById('status').textContent = 'Waiting for connection...';
    }
  </script>
</body>
</html>
